name: daily-update

on:
  schedule:
    # JST 7:00 / 12:00 / 19:00 (UTC 22:00 / 3:00 / 10:00) — 締切当日の取りこぼし防止で1日3回
    - cron: '0 22 * * *'
    - cron: '0 3 * * *'
    - cron: '0 10 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci || npm install
      - run: node scraper/index.mjs
      - name: Commit & push if changed
        run: |
          git config user.name "pokeca-radar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/data/data.json
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "data: auto update $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
